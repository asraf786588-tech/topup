<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Topup Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ff8c00; --bg: #000000; --card: #111111; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); color: white; text-align: center; margin: 0; padding: 0; }
        
        /* Banner Style */
        .banner-container { width: 100%; max-width: 500px; margin: auto; }
        .banner-container img { width: 100%; border-bottom: 3px solid var(--gold); border-radius: 0 0 20px 20px; box-shadow: 0 5px 15px rgba(255, 140, 0, 0.4); }

        .container { max-width: 420px; margin: 20px auto; padding: 25px; background: var(--card); border-radius: 25px; border: 1px solid #333; box-shadow: 0 0 30px rgba(0,0,0,1); }
        
        h1 { color: var(--gold); font-size: 28px; margin: 15px 0; text-transform: uppercase; font-weight: 900; letter-spacing: 1px; }
        
        .pay-box { background: linear-gradient(145deg, #1a1a1a, #000); padding: 15px; border-radius: 15px; border: 1.5px dashed var(--gold); margin-bottom: 25px; }
        .pay-box b { font-size: 22px; color: #fff; letter-spacing: 1px; }

        .pkg-list { display: grid; gap: 12px; margin-bottom: 25px; }
        .pkg { background: #1a1a1a; padding: 18px; border-radius: 15px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; cursor: pointer; }
        .pkg:hover { border-color: var(--gold); transform: translateY(-3px); background: #222; }
        .pkg.active { background: var(--gold); color: #000; font-weight: bold; border-color: #fff; }

        input { width: 90%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #444; background: #fff; color: #000; font-weight: bold; font-size: 16px; outline: none; }
        
        .order-btn { width: 100%; background: linear-gradient(45deg, #ff8c00, #ff4500); color: #fff; padding: 18px; border: none; border-radius: 15px; font-weight: 900; font-size: 20px; cursor: pointer; margin-top: 15px; transition: 0.3s; box-shadow: 0 5px 15px rgba(255, 69, 0, 0.3); }
        .order-btn:hover { transform: scale(1.02); filter: brightness(1.2); }
        
        .footer { font-size: 12px; color: #666; margin-top: 20px; padding-bottom: 30px; }
    </style>
</head>
<body>

    <div class="banner-container">
        <img src="https://raw.githubusercontent.com/asraf786588-tech/topup/main/banner.jpg" alt="Elite Topup Store Banner" onerror="this.src='https://via.placeholder.com/500x200/ff8c00/000000?text=ELITE+TOPUP+STORE'">
    </div>

    <div class="container">
        <h1>Elite Topup Store</h1>
        
        <div class="pay-box">
            <span style="color: var(--gold); font-weight: bold;">বিকাশ (Personal)</span><br>
            <b>01797211045</b>
        </div>

        <div class="pkg-list">
            <div class="pkg" onclick="sel(this, '115 Diamonds - 85 TK')"><span>💎 115 Diamonds</span> <b>85 TK</b></div>
            <div class="pkg" onclick="sel(this, '240 Diamonds - 165 TK')"><span>💎 240 Diamonds</span> <b>165 TK</b></div>
            <div class="pkg" onclick="sel(this, 'Weekly Lite - 150 TK')"><span>📅 Weekly Lite</span> <b>150 TK</b></div>
            <div class="pkg" onclick="sel(this, 'Monthly Lite - 550 TK')"><span>🌙 Monthly Lite</span> <b>550 TK</b></div>
        </div>

        <input type="number" id="pid" placeholder="Player ID">
        <input type="text" id="trxid" placeholder="Transaction ID (TrxID)">
        
        <button class="order-btn" onclick="submitOrder()">Confirm Order</button>
    </div>

    <div class="footer">
        © 2026 Elite Topup Store - All Rights Reserved
    </div>

    <script>
        let p = "";
        function sel(e, n) { 
            p = n; 
            document.querySelectorAll('.pkg').forEach(x => x.classList.remove('active'));
            e.classList.add('active');
        }

        function submitOrder() {
            const id = document.getElementById('pid').value;
            const trx = document.getElementById('trxid').value;
            if(!p || !id || !trx) { alert("দয়া করে সব তথ্য পূরণ করুন!"); return; }

            const token = "8389300808:AAHdLcNY4V8zxc8hmAVLYputQHTQpyuQpkM"; 
            const chat = "6980640033"; 
            const msg = `🔥 NEW ORDER!\n\n👑 Shop: Elite Topup Store\n📦 Package: ${p}\n🎮 Player ID: ${id}\n💰 TrxID: ${trx}`;
            
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat}&text=${encodeURIComponent(msg)}`)
            .then(() => { 
                alert("আপনার অর্ডারটি সফলভাবে সাবমিট হয়েছে!"); 
                location.reload(); 
            })
            .catch(() => alert("Error! আবার চেষ্টা করুন।"));
        }
    </script>
</body>
</html>
