<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Topup Store</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #0f172a; color: white; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 480px; margin: auto; background: #1e293b; padding: 20px; border-radius: 15px; box-shadow: 0 0 25px rgba(0,0,0,0.6); border: 1px solid #334155; }
        h1 { color: #38bdf8; font-size: 26px; text-shadow: 2px 2px #000; }
        .payment-info { background: #334155; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-left: 5px solid #38bdf8; text-align: left; }
        .package-card { background: #1e293b; margin: 10px 0; padding: 15px; border-radius: 10px; border: 1px solid #475569; cursor: pointer; transition: 0.3s; display: flex; justify-content: space-between; align-items: center; }
        .package-card:hover { border-color: #38bdf8; transform: scale(1.02); background: #334155; }
        .package-card.selected { border-color: #38bdf8; background: #075985; }
        input { width: 92%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #475569; background: #f8fafc; color: #0f172a; font-weight: bold; }
        .btn { display: block; width: 100%; background: linear-gradient(90deg, #38bdf8, #0ea5e9); color: white; padding: 15px; margin-top: 20px; border: none; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4); }
        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="container">
        <h1>💎 Elite Topup Store</h1>
        
        <div class="payment-info">
            <b>বিকাশ (Personal):</b> 01797211045 <br>
            <small>নগদ ও রকেট শীঘ্রই আসছে...</small>
        </div>

        <p>প্যাকেজ নির্বাচন করুন:</p>
        <div class="package-card" onclick="selectPkg(this, '115 Diamonds - 85 TK')"><span>💎 115 Diamonds</span> <b>85 TK</b></div>
        <div class="package-card" onclick="selectPkg(this, '240 Diamonds - 165 TK')"><span>💎 240 Diamonds</span> <b>165 TK</b></div>
        <div class="package-card" onclick="selectPkg(this, 'Weekly Lite - 150 TK')"><span>📅 Weekly Lite</span> <b>150 TK</b></div>
        <div class="package-card" onclick="selectPkg(this, 'Monthly Lite - 550 TK')"><span>🌙 Monthly Lite</span> <b>550 TK</b></div>

        <hr style="border: 0.5px solid #334155; margin: 20px 0;">
        
        <input type="text" id="playerid" placeholder="Player ID দিন (যেমন: 670233510)">
        <input type="text" id="sender_number" placeholder="আপনার যে নম্বর থেকে টাকা পাঠিয়েছেন">
        
        <button class="btn" onclick="sendOrder()">অর্ডার কনফার্ম করুন</button>
    </div>

    <script>
        let selectedPackage = "";
        function selectPkg(element, name) {
            selectedPackage = name;
            let cards = document.querySelectorAll('.package-card');
            cards.forEach(card => card.classList.remove('selected'));
            element.classList.add('selected');
        }

        function sendOrder() {
            const pid = document.getElementById('playerid').value;
            const s_num = document.getElementById('sender_number').value;
            if(!selectedPackage || !pid || !s_num) { alert("দয়া করে সব তথ্য পূরণ করুন!"); return; }

            const botToken = "8389300808:AAHdLcNY4V8zxc8hmAVLYputQHTQpyuQpkM"; 
            const chatId = "6980640033"; 
            const text = `🔔 নতুন অর্ডার এসেছে!\n\n📦 প্যাকেজ: ${selectedPackage}\n🎮 Player ID: ${pid}\n📱 প্রেরক নম্বর: ${s_num}\n\nসত্ত্বর চেক করুন!`;
            
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text)}`)
            .then(() => {
                alert("আপনার অর্ডারটি সফলভাবে আমাদের কাছে পৌঁছেছে!");
                location.reload();
            })
            .catch(() => alert("দুঃখিত, সংযোগ বিচ্ছিন্ন হয়েছে। আবার চেষ্টা করুন।"));
        }
    </script>
</body>
</html>
