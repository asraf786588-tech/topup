<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Topup Store</title>
    <style>
        :root { --gold: #ff8c00; --bg: #0b0f19; --card: #111827; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 70px; }
        
        /* Bottom Navigation */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #1f2937; display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid var(--gold); }
        .nav-item { color: #9ca3af; font-size: 12px; cursor: pointer; text-align: center; }
        .nav-item.active { color: var(--gold); }

        .container { max-width: 450px; margin: auto; padding: 20px; }
        .header-box { background: linear-gradient(45deg, #1e293b, #0f172a); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid var(--gold); }
        .balance-text { font-size: 24px; font-weight: bold; color: var(--gold); }
        
        .screen { display: none; }
        .screen.active { display: block; }

        /* Add Money Style */
        .input-box { width: 92%; padding: 14px; margin: 10px 0; border-radius: 10px; border: 1px solid #374151; background: #1f2937; color: white; }
        .btn-gold { width: 100%; background: var(--gold); color: black; padding: 15px; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 10px; }

        /* Package Grid */
        .pkg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .pkg { background: #1f2937; padding: 15px; border-radius: 12px; border: 1px solid #374151; text-align: center; cursor: pointer; }
        .pkg.selected { border-color: var(--gold); background: #2b1d0a; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <div>Total Balance</div>
        <div class="balance-text">৳ <span id="userBalance">0.00</span></div>
    </div>

    <div id="home" class="screen active">
        <h3>Select Diamonds</h3>
        <div class="pkg-grid">
            <div class="pkg" onclick="selectPkg(this, '115 Diamonds', 85)">💎 115<br><b>85 TK</b></div>
            <div class="pkg" onclick="selectPkg(this, '240 Diamonds', 165)">💎 240<br><b>165 TK</b></div>
            <div class="pkg" onclick="selectPkg(this, 'Weekly Lite', 150)">📅 Weekly<br><b>150 TK</b></div>
            <div class="pkg" onclick="selectPkg(this, 'Monthly Lite', 550)">🌙 Monthly<br><b>550 TK</b></div>
        </div>
        <input type="number" id="playerID" class="input-box" placeholder="Player ID">
        <button class="btn-gold" onclick="buyNow()">Buy Now</button>
    </div>

    <div id="addmoney" class="screen">
        <h3>Add Money</h3>
        <div style="background: #1f2937; padding: 15px; border-radius: 10px; margin-bottom: 15px;">
            <p>আমাদের বিকাশ নাম্বার (Personal):</p>
            <b style="font-size: 20px; color: var(--gold);">01797211045</b>
            <p style="font-size: 12px; color: #9ca3af;">টাকা পাঠিয়ে নিচের বক্সে তথ্য দিন।</p>
        </div>
        <input type="number" id="addAmount" class="input-box" placeholder="টাকার পরিমাণ (Amount)">
        <input type="text" id="addTrx" class="input-box" placeholder="ট্রানজেকশন আইডি (TrxID)">
        <button class="btn-gold" onclick="verifyAddMoney()">Verify TrxID</button>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item active" onclick="showScreen('home', this)">🏠<br>Home</div>
    <div class="nav-item" onclick="showScreen('addmoney', this)">💰<br>Add Money</div>
    <div class="nav-item">📜<br>History</div>
</div>

<script>
    let currentPkg = null;
    let botToken = "8389300808:AAHdLcNY4V8zxc8hmAVLYputQHTQpyuQpkM";
    let chatID = "6980640033";

    function showScreen(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    function selectPkg(el, name, price) {
        currentPkg = {name, price};
        document.querySelectorAll('.pkg').forEach(p => p.classList.remove('selected'));
        el.classList.add('selected');
    }

    function verifyAddMoney() {
        let amount = document.getElementById('addAmount').value;
        let trx = document.getElementById('addTrx').value;
        if(!amount || !trx) { alert("সব তথ্য দিন!"); return; }

        let msg = `➕ অ্যাড মানি রিকোয়েস্ট!\n💰 পরিমাণ: ${amount} TK\n🆔 TrxID: ${trx}\n\n✅ কনফার্ম: /confirm_add_${trx}\n❌ রিজেক্ট: /reject_add_${trx}`;
        
        fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatID}&text=${encodeURIComponent(msg)}`)
        .then(() => alert("অনুরোধ পাঠানো হয়েছে! এডমিন চেক করে ব্যালেন্স এড করে দিবে।"));
    }

    function buyNow() {
        let pid = document.getElementById('playerID').value;
        if(!currentPkg || !pid) { alert("প্যাকেজ এবং আইডি দিন!"); return; }
        alert("আপনার ব্যালেন্স নেই! দয়া করে অ্যাড মানি করুন।");
    }
</script>

</body>
</html>
