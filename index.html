	<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Topup Store</title>
    <style>
        :root { --gold: #ff8c00; --dark: #0b0f19; --card: #111827; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--dark); color: white; margin: 0; padding: 0; }
        .banner { width: 100%; max-width: 500px; margin: auto; display: block; border-bottom: 3px solid var(--gold); border-radius: 0 0 20px 20px; }
        .container { max-width: 450px; margin: 20px auto; padding: 20px; background: var(--card); border-radius: 20px; box-shadow: 0 0 30px rgba(255,140,0,0.2); }
        
        /* Auth Styles */
        #auth-screen { display: block; }
        #shop-screen { display: none; }
        .auth-input { width: 90%; padding: 14px; margin: 10px 0; border-radius: 10px; border: 1px solid #374151; background: #1f2937; color: white; font-size: 16px; }
        
        /* Shop Styles */
        h1 { color: var(--gold); font-size: 24px; text-transform: uppercase; margin-bottom: 15px; }
        .payment-info { background: #1f2937; padding: 12px; border-radius: 12px; border: 1px dashed var(--gold); margin-bottom: 20px; font-weight: bold; font-size: 18px; }
        
        /* Diamond Grid (হুবহু আপনার স্ক্রিনশটের মতো) */
        .pkg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .pkg { background: #1f2937; padding: 15px; border-radius: 12px; border: 1px solid #374151; cursor: pointer; transition: 0.3s; text-align: center; }
        .pkg:hover { border-color: var(--gold); transform: translateY(-3px); }
        .pkg.active { background: var(--gold); color: black; border-color: white; font-weight: bold; }
        .pkg span { display: block; font-size: 13px; opacity: 0.8; }
        .pkg b { display: block; font-size: 18px; margin-top: 5px; }

        .shop-input { width: 90%; padding: 14px; margin: 8px 0; border-radius: 10px; border: none; background: #f3f4f6; color: black; font-weight: bold; font-size: 16px; }
        .btn { width: 100%; background: linear-gradient(45deg, #ff8c00, #ff4500); color: white; padding: 16px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; box-shadow: 0 5px 20px rgba(255, 69, 0, 0.4); }
        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <img src="banner.jpg" class="banner" alt="Banner" onerror="this.src='https://via.placeholder.com/500x200?text=ELITE+TOPUP+STORE'">

    <div id="auth-screen" class="container">
        <h1>Registration</h1>
        <p style="color: #9ca3af;">Please create an account to continue</p>
        <input type="text" id="regName" class="auth-input" placeholder="Your Name">
        <input type="email" id="regEmail" class="auth-input" placeholder="Valid Gmail Address">
        <input type="password" id="regPass" class="auth-input" placeholder="Password">
        <button class="btn" onclick="validateAuth()">Create Account</button>
        <p id="auth-msg" style="color: #ef4444; font-size: 12px; margin-top: 10px;"></p>
    </div>

    <div id="shop-screen" class="container">
        <h1 id="welcomeText">Elite Topup Store</h1>
        
        <div class="payment-info">
            BKASH (Personal): 01797211045
        </div>

        <div class="pkg-grid">
            <div class="pkg" onclick="sel(this, '115 Diamonds - 85 TK')"><span>💎 115</span><b>85 TK</b></div>
            <div class="pkg" onclick="sel(this, '240 Diamonds - 165 TK')"><span>💎 240</span><b>165 TK</b></div>
            <div class="pkg" onclick="sel(this, '355 Diamonds - 250 TK')"><span>💎 355</span><b>250 TK</b></div>
            <div class="pkg" onclick="sel(this, '505 Diamonds - 340 TK')"><span>💎 505</span><b>340 TK</b></div>
            <div class="pkg" onclick="sel(this, '610 Diamonds - 425 TK')"><span>💎 610</span><b>425 TK</b></div>
            <div class="pkg" onclick="sel(this, 'Weekly Lite - 150 TK')"><span>📅 Weekly</span><b>150 TK</b></div>
            <div class="pkg" onclick="sel(this, 'Weekly Super - 190 TK')"><span>📅 Super</span><b>190 TK</b></div>
            <div class="pkg" onclick="sel(this, 'Monthly Lite - 550 TK')"><span>🌙 Monthly</span><b>550 TK</b></div>
            <div class="pkg" onclick="sel(this, 'Level Up Pass - 180 TK')"><span>📈 LevelUp</span><b>180 TK</b></div>
        </div>

        <input type="number" id="pid" class="shop-input" placeholder="Enter Player ID">
        <input type="text" id="trx" class="shop-input" placeholder="Transaction ID (TrxID)">
        
        <button class="btn" onclick="submitOrder()">CONFIRM ORDER</button>
    </div>

    <script>
        let selectedPkg = "";
        let userName = "";

        // রেজিস্ট্রেশন লজিক
        function validateAuth() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;
            const msg = document.getElementById('auth-msg');

            if(name === "" || email === "" || pass === "") {
                msg.innerText = "All fields are required!";
                return;
            }
            if(!email.includes("@") || !email.includes(".com")) {
                msg.innerText = "Please enter a valid Gmail address!";
                return;
            }

            userName = name;
            document.getElementById('welcomeText').innerText = "Welcome, " + name;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('shop-screen').style.display = 'block';
        }

        // প্যাকেজ সিলেকশন
        function sel(e, n) { 
            selectedPkg = n; 
            document.querySelectorAll('.pkg').forEach(x => x.classList.remove('active'));
            e.classList.add('active');
        }

        // অর্ডার সাবমিট
        function submitOrder() {
            const id = document.getElementById('pid').value;
            const t = document.getElementById('trx').value;
            if(!selectedPkg || !id || !t) { alert("Please fill all fields!"); return; }

            const token = "8389300808:AAHdLcNY4V8zxc8hmAVLYputQHTQpyuQpkM"; 
            const chat = "6980640033"; 
            const msg = `👑 NEW ORDER!\n\n👤 User: ${userName}\n📦 Pkg: ${selectedPkg}\n🎮 ID: ${id}\n💰 TrxID: ${t}`;
            
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat}&text=${encodeURIComponent(msg)}`)
            .then(() => { 
                alert("Order submitted successfully!"); 
                location.reload(); 
            })
            .catch(() => alert("Error! Please try again."));
        }
    </script>
</body>
</html>
