<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Topup Store</title>
    <style>
        :root { --gold: #ff8c00; --bg: #0b0f19; --card: #161b22; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 80px; }
        
        /* App Header */
        .app-header { background: linear-gradient(135deg, #1e293b, #0f172a); padding: 20px; border-bottom: 2px solid var(--gold); text-align: left; }
        .balance-box { background: rgba(255,140,0,0.1); padding: 12px; border-radius: 12px; border: 1px solid var(--gold); margin-top: 10px; }
        
        .container { max-width: 450px; margin: auto; padding: 15px; }
        .screen { display: none; animation: fadeIn 0.3s; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Category Grid */
        .category-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .cat-card { background: var(--card); border-radius: 15px; border: 1px solid #30363d; overflow: hidden; cursor: pointer; transition: 0.3s; text-align: center; padding-bottom: 10px; }
        .cat-card:hover { border-color: var(--gold); transform: translateY(-3px); }
        .cat-card img { width: 100%; height: 110px; object-fit: cover; border-bottom: 1px solid #30363d; }
        .cat-card h4 { margin: 8px 0 2px 0; font-size: 14px; color: var(--gold); }

        /* Package List UI */
        .list-header { display: flex; align-items: center; margin-bottom: 20px; background: #1f2937; padding: 10px; border-radius: 10px; }
        .back-btn { background: var(--gold); color: black; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-right: 15px; }
        
        .pkg-list { display: grid; gap: 10px; }
        .pkg-item { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .pkg-item.selected { border-color: var(--gold); background: #1c2128; box-shadow: 0 0 10px rgba(255,140,0,0.2); }
        
        .input-box { width: 92%; padding: 14px; margin-top: 20px; border-radius: 10px; border: 1px solid #30363d; background: #fff; color: #000; font-weight: bold; }
        .buy-btn { width: 100%; background: linear-gradient(45deg, #ff8c00, #ff4500); color: white; padding: 16px; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; margin-top: 15px; cursor: pointer; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #0d1117; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #30363d; }
        .nav-link { color: #8b949e; font-size: 12px; text-decoration: none; text-align: center; flex: 1; cursor: pointer; }
        .nav-link.active { color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>

<div class="app-header">
    <div style="font-size: 14px; color: #8b949e;">Account: <b id="uName">Ashik</b></div>
    <div class="balance-box">
        <span style="font-size: 11px;">Available Balance</span><br>
        <b style="font-size: 26px; color: var(--gold);">৳ <span id="uBal">0.00</span></b>
    </div>
</div>

<div class="container">
    
    <div id="category-screen" class="screen active">
        <h3 style="margin: 15px 0 10px 5px; font-size: 18px;">Select Category</h3>
        <div class="category-grid">
            <div class="cat-card" onclick="openPacks('UID Topup')">
                <img src="https://img.apk.sh/b/free-fire-icon.png">
                <h4>UID Topup</h4>
            </div>
            <div class="cat-card" onclick="openPacks('Weekly Membership')">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS8X3z_zPzYp7yqKqG1J2YV6mR6e7f7XmYmRA&s">
                <h4>Weekly</h4>
            </div>
            <div class="cat-card" onclick="openPacks('Monthly Membership')">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR_6uYvC0XvFm4fR6p1v8v8v8v8v8v8v8v8vA&s">
                <h4>Monthly</h4>
            </div>
            <div class="cat-card" onclick="openPacks('LevelUp Pass')">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTe_Z2Y9nK6g3p8f3p3p3p3p3p3p3p3p3p3pA&s">
                <h4>LevelUp Pass</h4>
            </div>
        </div>
    </div>

    <div id="packs-screen" class="screen">
        <div class="list-header">
            <button class="back-btn" onclick="goBack()">← Back</button>
            <h3 id="packTitle" style="margin: 0; font-size: 16px;">List</h3>
        </div>
        
        <div id="pkgContainer" class="pkg-list">
            </div>
        
        <input type="number" id="playerID" class="input-box" placeholder="Enter Player ID">
        <button class="buy-btn" onclick="placeOrder()">Purchase Now</button>
    </div>

</div>

<div class="bottom-nav">
    <div class="nav-link active" onclick="location.reload()">🏠<br>Home</div>
    <div class="nav-link" onclick="alert('Add Money System Coming Soon!')">💰<br>Add Money</div>
    <div class="nav-link" onclick="alert('Coming Soon!')">👤<br>Account</div>
</div>

<script>
    let selectedPack = null;
    const botToken = "8389300808:AAHdLcNY4V8zxc8hmAVLYputQHTQpyuQpkM";
    const chatID = "6980640033";

    // ডেটাবেজ (প্যাকেজ লিস্ট)
    const allData = {
        "UID Topup": [
            {n: "115 Diamonds", p: 85},
            {n: "240 Diamonds", p: 165},
            {n: "355 Diamonds", p: 250},
            {n: "505 Diamonds", p: 340},
            {n: "610 Diamonds", p: 425}
        ],
        "Weekly Membership": [
            {n: "Weekly Lite", p: 150},
            {n: "Weekly Super", p: 190}
        ],
        "Monthly Membership": [
            {n: "Monthly Lite", p: 550},
            {n: "Monthly Super", p: 750}
        ],
        "LevelUp Pass": [
            {n: "LevelUp Pass", p: 180}
        ]
    };

    function openPacks(cat) {
        document.getElementById('packTitle').innerText = cat;
        const container = document.getElementById('pkgContainer');
        container.innerHTML = ""; // আগের গুলো মুছে ফেলা
        
        allData[cat].forEach(item => {
            const div = document.createElement('div');
            div.className = "pkg-item";
            div.onclick = function() { selectPkg(this, item.n, item.p); };
            div.innerHTML = `<span>💎 ${item.n}</span> <b>৳ ${item.p}</b>`;
            container.appendChild(div);
        });

        document.getElementById('category-screen').classList.remove('active');
        document.getElementById('packs-screen').classList.add('active');
        window.scrollTo(0,0);
    }

    function goBack() {
        document.getElementById('packs-screen').classList.remove('active');
        document.getElementById('category-screen').classList.add('active');
    }

    function selectPkg(el, name, price) {
        selectedPack = { name, price };
        document.querySelectorAll('.pkg-item').forEach(i => i.classList.remove('selected'));
        el.classList.add('selected');
    }

    function placeOrder() {
        let pid = document.getElementById('playerID').value;
        let game = document.getElementById('packTitle').innerText;
        if(!selectedPack || !pid) { alert("সব তথ্য পূরণ করুন!"); return; }

        let msg = `🔥 NEW ORDER!\n🎮 Category: ${game}\n📦 Package: ${selectedPack.name}\n💰 Price: ${selectedPack.price} TK\n🆔 ID: ${pid}\n\n✅ Confirm: /confirm_${pid}\n❌ Reject: /reject_${pid}`;
        
        fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatID}&text=${encodeURIComponent(msg)}`)
        .then(() => alert("অর্ডার সফল হয়েছে! এডমিন চেক করে ডায়মন্ড পাঠিয়ে দিবে।"));
    }
</script>

</body>
</html>
